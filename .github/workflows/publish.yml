# Publishes pytest-socket to PyPI on a published GitHub Release.
# Auth is Trusted Publishing (OIDC), so there's no API token in the repo.
# Setup: https://docs.pypi.org/trusted-publishers/

name: Publish 📦 to PyPI

on:
  release:
    types: [published]

# Queue, never cancel: interrupting a publish mid-run risks a half-released state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false # avoid cache poisoning on a publish workflow
      - name: Build a source tarball and a wheel
        run: uv build
      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-to-pypi:
    name: Publish 📦 to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pytest-socket/${{ github.event.release.tag_name }}
    permissions:
      id-token: write # IMPORTANT: mandatory for Trusted Publishing
    steps:
      - name: Download the distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
